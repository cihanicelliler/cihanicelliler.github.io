<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Earth globe favicon with CI monogram">
  <title>Earth globe favicon with CI monogram</title>
  <defs>
    <linearGradient id="ocean" x1="14" y1="12" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fd3ff"/>
      <stop offset="0.55" stop-color="#2f95e6"/>
      <stop offset="1" stop-color="#1c4f9c"/>
    </linearGradient>
    <linearGradient id="landA" x1="19" y1="19" x2="33" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ee27a"/>
      <stop offset="1" stop-color="#3b9a56"/>
    </linearGradient>
    <linearGradient id="landB" x1="30" y1="33" x2="50" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fd06e"/>
      <stop offset="1" stop-color="#2d7f4f"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
  </defs>

  <!-- Dark-tab contrast ring -->
  <circle cx="32" cy="32" r="30" fill="#0b1b33"/>

  <!-- Globe body -->
  <circle cx="32" cy="32" r="28" fill="#154583"/>
  <circle cx="32" cy="32" r="26" fill="url(#ocean)"/>

  <g clip-path="url(#globeClip)">
    <!-- Continents (stylized but geographic-looking masses) -->
    <path fill="url(#landA)" d="M16 21c2-3 6-5 10-5l5 2 3 4-2 4-5 2-2 4-6 1-4-3-1-5z"/>
    <path fill="#5fb968" d="M17 35l4-2 5 1 3 5-2 6-6 1-4-4z"/>
    <path fill="url(#landB)" d="M34 21l7-3 8 3 2 5-3 4-5 1-3 3-5-2-2-6z"/>
    <path fill="#3f8f58" d="M36 35l5-1 8 4-1 6-8 4-5-2-1-5z"/>

    <!-- Meridians/parallels (subtle) -->
    <g fill="none" stroke="#ffffff" stroke-linecap="round" opacity="0.26">
      <path d="M8 32h48" stroke-width="1.2"/>
      <path d="M10 24c7 3 14 4 22 4s15-1 22-4" stroke-width="1.1"/>
      <path d="M10 40c7-3 14-4 22-4s15 1 22 4" stroke-width="1.1"/>
      <path d="M32 6c5 6 8 15 8 26s-3 20-8 26" stroke-width="1"/>
      <path d="M32 6c-5 6-8 15-8 26s3 20 8 26" stroke-width="1"/>
      <path d="M32 7c3 6 5 15 5 25s-2 19-5 25" stroke-width="0.9" opacity="0.8"/>
      <path d="M32 7c-3 6-5 15-5 25s2 19 5 25" stroke-width="0.9" opacity="0.8"/>
    </g>

    <!-- Elegant CI monogram with contrast halo -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M30 22c-6 0-10 4-10 10s4 10 10 10" stroke="#f3faff" stroke-width="7" opacity="0.95"/>
      <path d="M38 23v18" stroke="#f3faff" stroke-width="7" opacity="0.95"/>

      <path d="M30 22c-6 0-10 4-10 10s4 10 10 10" stroke="#0c223f" stroke-width="3.3"/>
      <path d="M38 23v18" stroke="#0c223f" stroke-width="3.3"/>
      <path d="M35.8 23h4.4M35.8 41h4.4" stroke="#0c223f" stroke-width="2.2"/>
    </g>
  </g>

  <circle cx="32" cy="32" r="26" fill="none" stroke="#d9efff" stroke-opacity="0.6" stroke-width="0.9"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#e8f5ff" stroke-opacity="0.75" stroke-width="1.1"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#071527" stroke-width="2"/>
</svg>
